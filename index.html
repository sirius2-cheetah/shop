<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius商店 注文フォーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --border-focus: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        /* 売り切れ状態の警告帯 */
        .soldout-banner {
            display: none;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            letter-spacing: 1px;
        }

        body.is-soldout .soldout-banner {
            display: block;
        }

        body.is-soldout .step-section,
        body.is-soldout .sticky-footer {
            opacity: 0.6;
            pointer-events: none;
        }

        body.is-soldout .action-btn {
            background-color: #94a3b8 !important;
            cursor: not-allowed;
        }

        .step-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #e2e8f0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* 動的表示用のスライドアニメーション設定 */
        .fade-section {
            max-height: 1000px;
            opacity: 1;
            transform: translateY(0);
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.3s ease, 
                        margin 0.4s ease, 
                        padding 0.4s ease, 
                        border 0.4s ease;
        }

        .fade-section.hidden {
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-top-width: 0;
            border-bottom-width: 0;
            pointer-events: none;
        }

        .step-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-number {
            background-color: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* 入力フォーム */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .required-badge {
            background-color: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        /* 選択カード */
        .card-grid {
            display: grid;
            gap: 16px;
        }

        .select-card {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #ffffff;
        }

        .select-card:hover {
            border-color: #94a3b8;
            background-color: #f8fafc;
        }

        .select-card input[type="checkbox"],
        .select-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-weight: 700;
            font-size: 16px;
        }

        /* 概要を型番のみにスッキリ統一 */
        .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
            font-weight: 500;
        }

        .card-price {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
            white-space: nowrap;
        }

        /* 売り切れスタイル */
        .select-card.soldout-product {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .select-card.soldout-product .card-price {
            color: var(--text-muted);
        }

        /* 選択状態 */
        .select-card.selected {
            border-color: var(--primary);
            background-color: #f0f9ff;
        }

        /* インジケータ */
        .check-indicator {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .radio-indicator {
            border-radius: 50%;
        }

        .select-card.selected .check-indicator {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .check-indicator::after {
            content: "";
            display: none;
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .select-card.selected .check-indicator::after {
            display: block;
        }

        .card-left {
            display: flex;
            align-items: center;
        }

        /* 固定ステータスバー */
        .sticky-footer {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            position: sticky;
            bottom: 20px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .sku-display {
            font-family: 'Inter', monospace;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 6px;
            word-break: break-all;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .total-label {
            font-size: 16px;
            font-weight: 700;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .total-amount span {
            font-size: 16px;
            color: var(--text-main);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-print { background-color: var(--success); }
        .btn-mail { background-color: var(--primary); }

        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
            }
        }

        /* 印刷用画面 */
        .print-container {
            display: none;
            background-color: white;
            max-width: 800px;
            margin: 0 auto;
        }

        .ticket {
            border: 2px solid #0f172a;
            padding: 40px;
            border-radius: 12px;
        }

        .ticket-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .ticket-sku {
            text-align: center;
            font-family: monospace;
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 30px;
            border-bottom: 2px solid #0f172a;
            padding-bottom: 20px;
        }

        .ticket-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 16px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 8px;
        }

        .ticket-total {
            font-size: 24px;
            font-weight: 700;
            text-align: right;
            margin-top: 30px;
        }

        .back-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            background-color: var(--text-muted);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        @media print {
            body { padding: 0; background-color: white; }
            .container { display: none !important; }
            .print-container { display: block !important; }
            .back-btn { display: none !important; }
            .ticket { border: 1px solid #000; }
        }
    </style>
</head>
<body>

    <div class="container" id="appContainer">
        
        <div class="soldout-banner">
            ⚠️ 只今主要パーツが売り切れ中です（次回入荷をお待ちください）
        </div>

        <h1 class="header-title">Sirius商店 注文フォーム</h1>

        <div class="step-section">
            <h2 class="step-title"><span class="step-number">0</span> お客様情報</h2>
            <div class="input-group" style="margin-bottom: 0;">
                <label for="buyerName">お名前 (ニックネーム可) <span class="required-badge">必須</span></label>
                <input type="text" id="buyerName" placeholder="例: ロボタロウ">
            </div>
            
            <div class="input-group" id="addressGroup" style="display: none; margin-top: 20px; margin-bottom: 0;">
                <label for="buyerAddress">お届け先住所 <span class="required-badge">必須</span></label>
                <textarea id="buyerAddress" placeholder="〒000-0000&#10;都道府県 市区町村 番地・マンション名"></textarea>
            </div>
        </div>

        <div class="step-section">
            <h2 class="step-title"><span class="step-number">1</span> 商品の選択 (複数選択可能)</h2>
            <div class="card-grid">
                
                <label class="select-card selected" id="card-main">
                    <div class="card-left">
                        <div class="check-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">TJ3B USB-C化キット</span>
                            <span class="card-desc">型番: DS-EG1009</span>
                        </div>
                    </div>
                    <span class="card-price" id="price-main">990円</span>
                    <input type="checkbox" class="product-check" id="check-main" value="990" data-code="DS-EG1009" checked onchange="updateForm()">
                </label>

                <label class="select-card" id="card-con">
                    <div class="card-left">
                        <div class="check-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">マイコン暴走阻止！ノイズキラーコンデンサ (2個)</span>
                            <span class="card-desc">型番: CK-2</span>
                        </div>
                    </div>
                    <span class="card-price" id="price-con">50円</span>
                    <input type="checkbox" class="product-check" id="check-con" value="50" data-code="CK-2" onchange="updateForm()">
                </label>

                <label class="select-card" id="card-xh">
                    <div class="card-left">
                        <div class="check-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">JST純正 XHコネクタ 2種5個セット</span>
                            <span class="card-desc">型番: XH-5</span>
                        </div>
                    </div>
                    <span class="card-price" id="price-xh">200円</span>
                    <input type="checkbox" class="product-check" id="check-xh" value="200" data-code="XH-5" onchange="updateForm()">
                </label>

            </div>
        </div>

        <div class="step-section fade-section" id="usbOptionsSection">
            <h2 class="step-title"><span class="step-number">2</span> USBコードの追加オプション (複数選択可能)</h2>
            <div class="card-grid">
                
                <label class="select-card" id="card-ua1">
                    <div class="card-left">
                        <div class="check-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">USB A to C コード [通信向け]</span>
                            <span class="card-desc">型番: UA-1</span>
                        </div>
                    </div>
                    <span class="card-price" id="price-ua1">+ 150円</span>
                    <input type="checkbox" class="option-check" id="check-ua1" value="150" data-code="UA-1" onchange="updateForm()">
                </label>

                <label class="select-card" id="card-uc1">
                    <div class="card-left">
                        <div class="check-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">USB C to C コード [通信向け]</span>
                            <span class="card-desc">型番: UC-1</span>
                        </div>
                    </div>
                    <span class="card-price" id="price-uc1">+ 160円</span>
                    <input type="checkbox" class="option-check" id="check-uc1" value="160" data-code="UC-1" onchange="updateForm()">
                </label>

                <label class="select-card" id="card-uc3">
                    <div class="card-left">
                        <div class="check-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">USB C to C コード [PD対応]</span>
                            <span class="card-desc">型番: UC-3</span>
                        </div>
                    </div>
                    <span class="card-price" id="price-uc3">+ 770円</span>
                    <input type="checkbox" class="option-check" id="check-uc3" value="770" data-code="UC-3" onchange="updateForm()">
                </label>

            </div>
        </div>

        <div class="step-section">
            <h2 class="step-title"><span class="step-number" id="deliveryStepNum">3</span> 受取方法の選択</h2>
            <div class="card-grid">
                
                <label class="select-card selected" id="card-direct">
                    <div class="card-left">
                        <div class="check-indicator radio-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">直接手渡し</span>
                            <span class="card-desc">次回集まりの際にお渡しします</span>
                        </div>
                    </div>
                    <span class="card-price">追加なし</span>
                    <input type="radio" name="delivery" class="delivery-radio" value="0" data-code="" checked onchange="updateForm()">
                </label>

                <label class="select-card" id="card-mail">
                    <div class="card-left">
                        <div class="check-indicator radio-indicator"></div>
                        <div class="card-content">
                            <span class="card-title">郵送 (クリックポスト)</span>
                            <span class="card-desc">型番: CP</span>
                        </div>
                    </div>
                    <span class="card-price">+ 185円</span>
                    <input type="radio" name="delivery" class="delivery-radio" value="185" data-code="CP" onchange="updateForm()">
                </label>

            </div>
        </div>

        <div class="sticky-footer">
            <div class="sku-display" id="displaySku">構成: 読込中...</div>
            <div class="total-row">
                <span class="total-label">合計お支払い金額</span>
                <div class="total-amount"><span id="displayTotal">0</span> <span>円</span></div>
            </div>
            
            <div class="button-group">
                <button type="button" class="action-btn btn-print" id="btnPrint" onclick="executeAction('print')">
                    📄 PDF出力 (手渡し申込用)
                </button>
                <button type="button" class="action-btn btn-mail" id="btnMail" onclick="executeAction('mail')">
                    ✉️ メールで注文を送信する
                </button>
            </div>
        </div>
    </div>

    <div class="print-container" id="printContainer">
        <div class="ticket">
            <div class="ticket-title">Sirius商店 注文申込書</div>
            <div class="ticket-sku" id="printSku">---</div>
            
            <div class="ticket-row">
                <span style="font-weight: 700;">お名前</span>
                <span id="printName">未入力</span>
            </div>
            
            <div class="ticket-row" id="printAddressRow" style="display: none;">
                <span style="font-weight: 700;">ご住所</span>
                <span id="printAddress" style="text-align: right; white-space: pre-wrap;"></span>
            </div>
            
            <div style="margin-top: 24px; margin-bottom: 8px; font-weight: 700;">ご注文内容・受取方法</div>
            <div id="printItemsList">
                </div>
            
            <div class="ticket-total">
                合計金額: <span id="printPrice">0</span> 円
            </div>
        </div>
        <button class="back-btn" onclick="closePrintView()">入力画面に戻る</button>
    </div>

    <script>
        // =================================================================
        // 【商品別 在庫管理スイッチ】
        // ご指定の最新在庫ステータスに更新しました！
        // =================================================================
        const IN_STOCK = {
            MAIN: true, // TJ3B USB-C化キット (DS-EG1009) ➔ あり
            CON:  true, // ノイズキラーコンデンサ (CK-2) ➔ あり
            XH:   true,  // JST純正 XHコネクタセット (XH-5) ➔ あり
            UA1:  true,  // USB A to C コード (UA-1) ➔ あり
            UC1:  false, // USB C to C コード (UC-1) ➔ なし
            UC3:  true   // USB C to C コード [PD対応] (UC-3) ➔ あり
        };
        // =================================================================

        let uniqueId = "";
        let currentSkuString = "";

        function generateUniqueId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < 4; i++) {
                uniqueId += chars.charAt(Math.floor(Math.random() * chars.length));
            }
        }

        function applyStockSettings() {
            if (!IN_STOCK.MAIN && !IN_STOCK.CON && !IN_STOCK.XH) {
                document.body.classList.add('is-soldout');
            }

            // キット本体
            if (!IN_STOCK.MAIN) {
                document.getElementById('card-main').classList.add('soldout-product');
                document.getElementById('price-main').textContent = "売り切れ";
                document.getElementById('check-main').checked = false;
                document.getElementById('check-main').disabled = true;
                document.getElementById('card-main').classList.remove('selected');
            }
            // コンデンサ
            if (!IN_STOCK.CON) {
                document.getElementById('card-con').classList.add('soldout-product');
                document.getElementById('price-con').textContent = "売り切れ";
                document.getElementById('check-con').checked = false;
                document.getElementById('check-con').disabled = true;
            }
            // XHコネクタ
            if (!IN_STOCK.XH) {
                document.getElementById('card-xh').classList.add('soldout-product');
                document.getElementById('price-xh').textContent = "売り切れ";
                document.getElementById('check-xh').disabled = true;
            }
            // USBコード UA-1
            if (!IN_STOCK.UA1) {
                document.getElementById('card-ua1').classList.add('soldout-product');
                document.getElementById('price-ua1').textContent = "売り切れ";
                document.getElementById('check-ua1').disabled = true;
            }
            // USBコード UC-1
            if (!IN_STOCK.UC1) {
                document.getElementById('card-uc1').classList.add('soldout-product');
                document.getElementById('price-uc1').textContent = "売り切れ";
                document.getElementById('check-uc1').disabled = true;
            }
            // USBコード UC-3
            if (!IN_STOCK.UC3) {
                document.getElementById('card-uc3').classList.add('soldout-product');
                document.getElementById('price-uc3').textContent = "売り切れ";
                document.getElementById('check-uc3').disabled = true;
            }
        }

        function updateForm() {
            let totalPrice = 0;
            let skuParts = [];

            const isMainKitSelected = document.getElementById('check-main').checked && !document.getElementById('check-main').disabled;
            
            const products = document.querySelectorAll('.product-check');
            products.forEach(p => {
                const card = p.closest('.select-card');
                if (p.checked && !p.disabled) {
                    card.classList.add('selected');
                    totalPrice += parseInt(p.value, 10);
                    skuParts.push(p.getAttribute('data-code'));
                } else {
                    card.classList.remove('selected');
                }
            });

            const usbSection = document.getElementById('usbOptionsSection');
            const deliveryStepNum = document.getElementById('deliveryStepNum');

            if (isMainKitSelected) {
                usbSection.classList.remove('hidden');
                deliveryStepNum.textContent = "3";
                
                const usbOptions = document.querySelectorAll('.option-check');
                usbOptions.forEach(opt => {
                    const card = opt.closest('.select-card');
                    if (opt.checked && !opt.disabled) {
                        card.classList.add('selected');
                        totalPrice += parseInt(opt.value, 10);
                        skuParts.push(opt.getAttribute('data-code'));
                    } else {
                        card.classList.remove('selected');
                    }
                });
            } else {
                usbSection.classList.add('hidden');
                deliveryStepNum.textContent = "2";
                
                const usbOptions = document.querySelectorAll('.option-check');
                usbOptions.forEach(opt => {
                    opt.checked = false;
                    opt.closest('.select-card').classList.remove('selected');
                });
            }

            let isPostalSelected = false;
            const deliveryRadios = document.querySelectorAll('.delivery-radio');
            deliveryRadios.forEach(radio => {
                const card = radio.closest('.select-card');
                if (radio.checked) {
                    card.classList.add('selected');
                    totalPrice += parseInt(radio.value, 10);
                    const code = radio.getAttribute('data-code');
                    if (code) {
                        skuParts.push(code);
                    }
                    if (code === "CP") {
                        isPostalSelected = true;
                    }
                } else {
                    card.classList.remove('selected');
                }
            });

            document.getElementById('addressGroup').style.display = isPostalSelected ? 'block' : 'none';

            if (skuParts.length === 0 || (skuParts.length === 1 && skuParts[0] === "CP")) {
                currentSkuString = `[${uniqueId}] 未選択`;
            } else {
                currentSkuString = `[${uniqueId}] ${skuParts.join('+')}`;
            }
            document.getElementById('displaySku').textContent = `注文構成: ${currentSkuString}`;
            document.getElementById('displayTotal').textContent = totalPrice.toLocaleString('ja-JP');
        }

        function executeAction(type) {
            const name = document.getElementById('buyerName').value.trim();
            if (!name) {
                alert("お名前を入力してください。");
                document.getElementById('buyerName').focus();
                return;
            }

            const checkedProducts = document.querySelectorAll('.product-check:checked');
            if (checkedProducts.length === 0) {
                alert("商品が選択されていません。購入するパーツにチェックを入れてください。");
                return;
            }

            const checkedDelivery = document.querySelector('.delivery-radio:checked');
            const isPostal = checkedDelivery.getAttribute('data-code') === "CP";
            const address = document.getElementById('buyerAddress').value.trim();

            if (isPostal && !address) {
                alert("郵送をご希望の場合は、お届け先住所を入力してください。");
                document.getElementById('buyerAddress').focus();
                return;
            }

            const isMainKitSelected = document.getElementById('check-main').checked && !document.getElementById('check-main').disabled;
            if (isMainKitSelected) {
                window.open("https://sirius2-cheetah.github.io/shop/manual/USB%E3%82%AD%E3%83%83%E3%83%88DS-EG1009/", "_blank");
            }

            const totalPrice = document.getElementById('displayTotal').textContent;
            const deliveryName = checkedDelivery.closest('.select-card').querySelector('.card-title').textContent;

            let itemsTextForMail = "";
            let itemsHtmlForPrint = "";
            
            checkedProducts.forEach(p => {
                const title = p.closest('.select-card').querySelector('.card-title').textContent;
                const price = p.value;
                itemsTextForMail += `・${title} (${price}円)\n`;
                itemsHtmlForPrint += `<div class="ticket-row"><span>${title}</span><span>${price}円</span></div>`;
            });

            if (isMainKitSelected) {
                const checkedOptions = document.querySelectorAll('.option-check:checked');
                checkedOptions.forEach(opt => {
                    if (!opt.disabled) {
                        const title = opt.closest('.select-card').querySelector('.card-title').textContent;
                        const price = opt.value;
                        itemsTextForMail += `— [追加オプション] ${title} (+${price}円)\n`;
                        itemsHtmlForPrint += `<div class="ticket-row"><span>${title}</span><span>+${price}円</span></div>`;
                    }
                });
            }

            const deliveryPrice = checkedDelivery.value;
            itemsTextForMail += `・受取方法: ${deliveryName}\n`;
            itemsHtmlForPrint += `<div class="ticket-row"><span style="color: #64748b;">受取: ${deliveryName}</span><span style="color: #64748b;">+${deliveryPrice}円</span></div>`;

            if (type === 'print') {
                document.getElementById('printSku').textContent = currentSkuString;
                document.getElementById('printName').textContent = name;
                document.getElementById('printItemsList').innerHTML = itemsHtmlForPrint;
                document.getElementById('printPrice').textContent = totalPrice;
                
                if (isPostal && address) {
                    document.getElementById('printAddressRow').style.display = 'flex';
                    document.getElementById('printAddress').textContent = address;
                } else {
                    document.getElementById('printAddressRow').style.display = 'none';
                }
                
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('printContainer').style.display = 'block';
                
                setTimeout(() => { window.print(); }, 300);

            } else if (type === 'mail') {
                const targetEmail = "shtgames.shop@gmail.com"; 
                const subject = encodeURIComponent(`【注文】Sirius商店 ${currentSkuString}`);
                
                let addressSection = "";
                if (isPostal) {
                    addressSection = `【お届け先住所】\n${address}\n\n`;
                }

                const body = encodeURIComponent(
                    `注文をお願いします。\n\n` +
                    `【管理コード】\n${currentSkuString}\n\n` +
                    `【お名前】 ${name}\n\n` +
                    `【ご注文内容】\n${itemsTextForMail}\n` +
                    `【合計金額】 ${totalPrice}円\n\n` +
                    addressSection +
                    `※決済はロボカップ会の練習会での現金の手渡しとなります。\n` +
                    `※このメールは受取時に確認させていただく場合がございますので、当日まで大切に保管し、会場にてご提示ください。`
                );
                
                window.location.href = `mailto:${targetEmail}?subject=${subject}&body=${body}`;
            }
        }

        function closePrintView() {
            document.getElementById('printContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
        }

        window.onload = () => {
            generateUniqueId();
            applyStockSettings();
            updateForm();
        };
    </script>

</body>
</html>
